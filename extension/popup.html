<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Pro</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="header">
        <h1>LUMINA <span>PRO</span></h1>
        <div id="status-dot" aria-label="System ready"></div>
    </div>

    <div class="score-card">
        <div class="score-row">
            <span class="label">Integrity Score</span>
            <span id="score-text">0%</span>
        </div>
        <div class="progress-track">
            <div id="score-bar" style="width: 0%"></div>
        </div>
        <p id="verdict-label">System Ready</p>
    </div>

    <div id="clone-alert">
        <p>Malicious Clone</p>
        <a id="secure-link" href="#" target="_blank" rel="noopener noreferrer">Go to Original Site -&gt;</a>
    </div>

    <button id="scan-btn" type="button">Run Integrity Audit</button>
    <script src="popup.js"></script>
</body>
</html>
